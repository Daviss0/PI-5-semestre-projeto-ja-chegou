<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Minha Conta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/imask"></script> <!-- máscaras -->
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
            <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-4">Minha Conta</h4>

                    <form th:action="@{/account}" th:object="${userForm}" method="post" id="accountForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Dados Pessoais -->
                        <div class="mb-3">
                            <label class="form-label">Nome completo</label>
                            <input type="text" class="form-control" th:field="*{name}" maxlength="120" required/>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Data de nascimento</label>
                                <input type="date" class="form-control" th:field="*{birthDate}"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control" th:field="*{phone}" id="phone" placeholder="(99) 99999-9999"/>
                            </div>
                        </div>

                        <hr/>

                        <!-- Endereço -->
                        <h6 class="mt-3">Endereço</h6>
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label">CEP</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" th:field="*{cep}" id="cep" placeholder="00000-000"/>
                                    <button type="button" id="btnBuscarCep" class="btn btn-outline-secondary">
                                        <span id="cepBtnText">Buscar</span>
                                        <span id="cepSpinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display:none;"></span>
                                    </button>
                                </div>
                                <div id="cepFeedback" class="form-text text-danger" style="display:none;"></div>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label">Logradouro</label>
                                <input type="text" class="form-control" th:field="*{street}" id="street"/>
                            </div>

                            <div class="col-md-5">
                                <label class="form-label">Bairro</label>
                                <input type="text" class="form-control" th:field="*{neighborhood}" id="neighborhood"/>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Cidade</label>
                                <input type="text" class="form-control" th:field="*{city}" id="city"/>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">UF</label>
                                <input type="text" class="form-control" th:field="*{state}" id="state" maxlength="2"/>
                            </div>
                        </div>

                        <hr/>

                        <!-- Alterar Senha -->
                        <h6 class="mt-3">Alterar senha</h6>
                        <div class="mb-3">
                            <label class="form-label">Senha atual</label>
                            <input type="password" class="form-control" id="currentPassword" name="currentPassword"/>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nova senha</label>
                                <input type="password" class="form-control" id="newPassword" name="newPassword" minlength="6"/>
                                <div class="form-text">Mínimo 6 caracteres</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Confirmar nova senha</label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"/>
                                <div id="pwdMismatch" class="form-text text-danger" style="display:none;">As senhas não conferem.</div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-end">
                            <a href="/" class="btn btn-outline-secondary me-2">Voltar</a>
                            <button type="submit" class="btn btn-primary" id="btnSave">Salvar alterações</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- Máscaras ---
    IMask(document.getElementById('cep'), { mask: '00000-000' });
    IMask(document.getElementById('phone'), { mask: '(00) 00000-0000' });

    // --- Funções CEP ---
    const cepInput = document.getElementById('cep');
    const cepBtn = document.getElementById('btnBuscarCep');
    const cepSpinner = document.getElementById('cepSpinner');
    const cepText = document.getElementById('cepBtnText');
    const cepFeedback = document.getElementById('cepFeedback');

    function limpaCamposEndereco() {
        ['street','neighborhood','city','state'].forEach(id => document.getElementById(id).value = '');
    }

    async function buscarCep() {
        const cep = cepInput.value.replace(/\D/g,'');
        if (cep.length !== 8) {
            cepFeedback.textContent = 'CEP inválido.';
            cepFeedback.style.display = 'block';
            limpaCamposEndereco();
            return;
        }

        cepFeedback.style.display = 'none';
        cepSpinner.style.display = 'inline-block';
        cepText.textContent = 'Buscando...';
        cepBtn.disabled = true;

        try {
            const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await resp.json();
            if (data.erro) {
                cepFeedback.textContent = 'CEP não encontrado.';
                cepFeedback.style.display = 'block';
                limpaCamposEndereco();
            } else {
                document.getElementById('street').value = data.logradouro || '';
                document.getElementById('neighborhood').value = data.bairro || '';
                document.getElementById('city').value = data.localidade || '';
                document.getElementById('state').value = data.uf || '';
            }
        } catch {
            cepFeedback.textContent = 'Falha ao buscar CEP. Tente novamente.';
            cepFeedback.style.display = 'block';
        } finally {
            cepSpinner.style.display = 'none';
            cepText.textContent = 'Buscar';
            cepBtn.disabled = false;
        }
    }

    cepBtn.addEventListener('click', buscarCep);
    cepInput.addEventListener('blur', () => { if (cepInput.value.trim() !== '') buscarCep(); });

    // --- Validação de senha ---
    const newPwd = document.getElementById('newPassword');
    const confirmPwd = document.getElementById('confirmPassword');
    const pwdMismatch = document.getElementById('pwdMismatch');
    const form = document.getElementById('accountForm');

    function validarSenhas() {
        if (!newPwd.value && !confirmPwd.value) {
            pwdMismatch.style.display = 'none';
            return true;
        }
        const iguais = newPwd.value === confirmPwd.value;
        pwdMismatch.style.display = iguais ? 'none' : 'block';
        return iguais;
    }

    newPwd.addEventListener('input', validarSenhas);
    confirmPwd.addEventListener('input', validarSenhas);

    form.addEventListener('submit', (e) => {
        if (!validarSenhas()) {
            e.preventDefault();
            alert('As senhas não conferem. Corrija antes de salvar.');
        }
    });
</script>

</body>
</html>
