<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 p-4 bg-white shadow rounded">
    <h2 class="mb-4 text-center">Cadastro de Cliente</h2>
    <form id="registerForm">
        <div class="row">
            <!-- Dados Pessoais -->
            <h5 class="mb-3">Dados Pessoais</h5>

            <div class="col-md-6 mb-3">
                <label>Nome Completo</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>CPF</label>
                <input type="text" id="cpf" name="cpf" class="form-control" maxlength="14" placeholder="000.000.000-00" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Data de Nascimento</label>
                <input type="date" id="birthDate" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>E-mail</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Telefone</label>
                <input type="text" id="phone" class="form-control" maxlength="11" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Senha</label>
                <input type="password" id="password" class="form-control" minlength="6" required>
            </div>

            <hr class="mt-4 mb-3">

            <!-- Endereço -->
            <h5 class="mb-3">Endereço</h5>

            <div class="col-md-3 mb-3">
                <label>CEP</label>
                <input type="text" id="cep" name="cep" class="form-control" maxlength="9" placeholder="00000-000" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Logradouro</label>
                <input type="text" id="logradouro" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Número</label>
                <input type="text" id="number" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label>Complemento</label>
                <input type="text" id="complement" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Bairro</label>
                <input type="text" id="hood" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Cidade</label>
                <input type="text" id="city" class="form-control" required>
            </div>

            <div class="col-md-1 mb-3">
                <label>UF</label>
                <input type="text" id="state" class="form-control" maxlength="2" required>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success px-4">Cadastrar</button>
            <a href="/mainPage" class="btn btn-outline-secondary ms-2">Voltar</a>
        </div>

        <div id="msg" class="mt-4 text-center"></div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        // 🔹 Máscara CPF
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/^(\d{3})(\d)/, '$1.$2')
                .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
                .replace(/\.(\d{3})(\d)/, '.$1-$2');
            e.target.value = v;
        });

        // 🔹 Máscara CEP
        const cepInput = document.getElementById('cep');
        cepInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 8) v = v.slice(0, 8);
            if (v.length > 5) v = v.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = v;
        });

        // 🔹 Consulta automática do CEP via ViaCEP
        cepInput.addEventListener('blur', async () => {
            const cep = cepInput.value.replace(/\D/g, '');
            if (cep.length === 8) {
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const data = await res.json();

                    if (!data.erro) {
                        document.getElementById('logradouro').value = data.logradouro || '';
                        document.getElementById('hood').value = data.bairro || '';
                        document.getElementById('city').value = data.localidade || '';
                        document.getElementById('state').value = data.uf || '';
                    } else {
                        alert("CEP não encontrado.");
                    }
                } catch (err) {
                    console.error("Erro ao consultar ViaCEP:", err);
                }
            } else if (cep.length > 0) {
                alert("CEP deve ter 8 dígitos numéricos.");
            }
        });

        // 🔹 Envio do formulário
        const form = document.getElementById('registerForm');
        const msgEl = document.getElementById('msg');

        form.addEventListener('submit', async e => {
            e.preventDefault();

            const cpfLimpo = cpfInput.value.replace(/\D/g, '');
            const cepLimpo = cepInput.value.replace(/\D/g, '');

            const data = {
                name: document.getElementById('name').value.trim(),
                cpf: cpfLimpo,
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                birthDate: document.getElementById('birthDate').value,
                cep: cepLimpo,
                logradouro: document.getElementById('logradouro').value.trim(),
                number: document.getElementById('number').value.trim(),
                complement: document.getElementById('complement').value.trim(),
                hood: document.getElementById('hood').value.trim(),
                city: document.getElementById('city').value.trim(),
                state: document.getElementById('state').value.trim()
            };

            try {
                const res = await fetch('/api/clients/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (msgEl) msgEl.innerHTML = ''; // limpa mensagens antigas

                if (res.ok) {
                    if (msgEl) {
                        msgEl.innerHTML = `
                        <div class="alert alert-success">
                            Cadastro realizado com sucesso! Redirecionando para a tela de login...
                        </div>`;
                    }
                    setTimeout(() => window.location.href = '/client/login', 2000);
                } else {
                    const err = await res.text();
                    if (msgEl) {
                        msgEl.innerHTML = `<div class="alert alert-danger">${err}</div>`;
                    }
                }
            } catch (err) {
                console.error('Erro no envio do cadastro:', err);
                if (msgEl) {
                    msgEl.innerHTML = `<div class="alert alert-danger">Erro ao conectar ao servidor.</div>`;
                }
            }
        });
    });
</script>
</body>
</html>
