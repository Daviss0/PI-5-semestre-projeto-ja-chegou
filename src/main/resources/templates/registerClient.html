<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 p-4 bg-white shadow rounded">
    <h2 class="mb-4 text-center">Cadastro de Cliente</h2>
    <form id="registerForm">
        <div class="row">
            <!-- Dados Pessoais -->
            <h5 class="mb-3">Dados Pessoais</h5>

            <div class="col-md-6 mb-3">
                <label>Nome Completo</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>CPF</label>
                <input type="text" id="cpf" class="form-control" maxlength="11" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Data de Nascimento</label>
                <input type="date" id="birthDate" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>E-mail</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Telefone</label>
                <input type="text" id="phone" class="form-control" maxlength="11" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Senha</label>
                <input type="password" id="password" class="form-control" minlength="6" required>
            </div>

            <hr class="mt-4 mb-3">

            <!-- Endereço -->
            <h5 class="mb-3">Endereço</h5>

            <div class="col-md-3 mb-3">
                <label>CEP</label>
                <input type="text" id="cep" class="form-control" maxlength="8" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Logradouro</label>
                <input type="text" id="logradouro" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Número</label>
                <input type="text" id="number" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label>Complemento</label>
                <input type="text" id="complement" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Bairro</label>
                <input type="text" id="hood" class="form-control" required>
            </div>

            <div class="col-md-3 mb-3">
                <label>Cidade</label>
                <input type="text" id="city" class="form-control" required>
            </div>

            <div class="col-md-1 mb-3">
                <label>UF</label>
                <input type="text" id="state" class="form-control" maxlength="2" required>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success px-4">Cadastrar</button>
            <a href="/login" class="btn btn-outline-secondary ms-2">Já tenho conta</a>
        </div>

        <div id="msg" class="mt-4 text-center"></div>
    </form>
</div>

<script>
    // 🔹 Auto-preenche endereço via API ViaCEP
    document.getElementById('cep').addEventListener('blur', async () => {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');
        if (cep.length === 8) {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) {
                document.getElementById('logradouro').value = data.logradouro || '';
                document.getElementById('hood').value = data.bairro || '';
                document.getElementById('city').value = data.localidade || '';
                document.getElementById('state').value = data.uf || '';
            }
        }
    });

    // 🔹 Envio dos dados para o backend
    document.getElementById('registerForm').addEventListener('submit', async e => {
        e.preventDefault();
        const data = {
            name: name.value,
            cpf: cpf.value,
            email: email.value,
            password: password.value,
            phone: phone.value,
            birthDate: birthDate.value,
            cep: cep.value,
            logradouro: logradouro.value,
            number: number.value,
            complement: complement.value,
            hood: hood.value,
            city: city.value,
            state: state.value
        };

        const res = await fetch('/api/clients/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        const msgEl = document.getElementById('msg');
        if (res.ok) {
            msgEl.innerHTML = `<div class="alert alert-success">Cadastro realizado com sucesso!</div>`;
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            const err = await res.text();
            msgEl.innerHTML = `<div class="alert alert-danger">${err}</div>`;
        }
    });
</script>

</body>
</html>
