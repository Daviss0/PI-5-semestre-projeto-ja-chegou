<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login do Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 p-4 bg-white shadow rounded" style="max-width: 500px;">
    <h2 class="mb-4 text-center">Login do Cliente</h2>

    <form id="loginForm" autocomplete="off">
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="exemplo@email.com" autocomplete="off" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" name="password" class="form-control"
                   minlength="6" autocomplete="new-password" required>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-success px-4">Entrar</button>
            <a href="/register" class="btn btn-outline-secondary ms-2">Cadastrar-se</a>
        </div>

        <div id="msg" class="mt-4 text-center"></div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById('loginForm');
        const msgEl = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value.trim()
            };

            try {
                const res = await fetch('/api/clients/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if (!msgEl) return;

                if (res.ok) {
                    const result = await res.text();

                    localStorage.setItem("clientLogged", "true");

                    localStorage.setItem("clientEmail", data.email);

                    msgEl.innerHTML = `
        <div class="alert alert-success">
            Login realizado com sucesso! Redirecionando...
        </div>`;

                    setTimeout(() => window.location.href = '/mainPage', 1500);
                } else {
                    const err = await res.text();
                    msgEl.innerHTML = `<div class="alert alert-danger">${err}</div>`;
                }
            } catch (err) {
                if (msgEl)
                    msgEl.innerHTML = `<div class="alert alert-danger">Erro ao conectar ao servidor.</div>`;
                console.error(err);
            }
        });
    });
</script>
</body>
</html>
